<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0f172a"/>
  <!-- Ticket body (horizontal bar) -->
  <rect x="6" y="12" width="20" height="8" rx="2" fill="#38bdf8"/>
  <!-- Side notches (punched out) -->
  <circle cx="8" cy="16" r="2.5" fill="#0f172a"/>
  <circle cx="24" cy="16" r="2.5" fill="#0f172a"/>
  <!-- Perforation line -->
  <line x1="16" y1="12" x2="16" y2="20" stroke="#0f172a" stroke-width="1" stroke-dasharray="1 1" stroke-linecap="round"/>
</svg>
